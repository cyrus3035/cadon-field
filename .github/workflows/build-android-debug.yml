name: Build CADonField Debug APK (Gradle Cloud)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_OPTIONS: --experimental-vm-modules

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 24.x
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Patch react-native-webview/index.js ESM -> CJS
      run: |
        f="node_modules/react-native-webview/index.js"
        if [ -f "$f" ]; then
          cat > "$f" << 'PATCH_EOF'
        const WebView = require('./lib/WebView').default;
        module.exports = WebView;
        module.exports.WebView = WebView;
        module.exports.default = WebView;
        PATCH_EOF
        fi

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          build-tools;34.0.0
          platforms;android-35

    - name: Run expo prebuild
      run: npx expo prebuild --platform android --no-install

    - name: Fix Kotlin/Compose compatibility
      run: |
        cat >> android/build.gradle << 'EOF'
        subprojects {
            tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                kotlinOptions {
                    freeCompilerArgs += ["-P", "plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=true"]
                }
            }
        }
        EOF

    - name: Force JS bundle embedding in debug build
      run: |
        sed -i '/react {/a\    debuggableVariants = []' android/app/build.gradle
        cat android/app/build.gradle | grep -A10 'react {'

    - name: Get resolved entry file from expo config
      id: resolve_entry
      run: |
        ENTRY_FILE=$(node node_modules/expo/scripts/resolveAppEntry.js . android relative)
        echo "ENTRY_FILE=$ENTRY_FILE" >> $GITHUB_ENV
        echo "Resolved entry file: $ENTRY_FILE"

    - name: Create assets directory and generate JS bundle manually
      run: |
        mkdir -p android/app/src/main/assets
        echo "=== Generating JS bundle with entry file: $ENTRY_FILE ==="
        npx react-native bundle --platform android --dev false --entry-file "$ENTRY_FILE" --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res/ 2>&1
        
        if [ -f "android/app/src/main/assets/index.android.bundle" ]; then
          echo "JS bundle generated: $(wc -c < android/app/src/main/assets/index.android.bundle) bytes"
        else
          echo "JS bundle generation failed!"
          exit 1
        fi

    - name: Build Android APK
      run: |
        cd android
        export GRADLE_OPTS="-Xmx4g -XX:MaxMetaspaceSize=512m"
        ./gradlew assembleDebug -PbundleInDebug=true --no-daemon
        cd ..

    - name: Verify APK exists
      run: |
        APK_PATH=$(find android -name "app-debug.apk" -type f 2>/dev/null | head -1)
        if [ -n "$APK_PATH" ]; then
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
        else
          echo "APK not found!"
          exit 1
        fi

    - name: Verify JS bundle is inside APK
      run: |
        BUNDLE_CHECK=$(unzip -l "$APK_PATH" | grep "assets/index.android.bundle")
        if [ -n "$BUNDLE_CHECK" ]; then
          echo "SUCCESS: index.android.bundle found in APK"
        else
          echo "ERROR: index.android.bundle NOT FOUND in APK!"
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: CADonField-debug-apk
        path: ${{ env.APK_PATH }}
        retention-days: 14
