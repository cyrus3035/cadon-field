name: Build CADonField Debug APK (Gradle Cloud)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: Patch react-native-webview/index.js ESM -> CJS
      run: |
        f="node_modules/react-native-webview/index.js"
        if [ -f "$f" ]; then
          cat > "$f" << 'PATCH_EOF'
        const WebView = require('./lib/WebView').default;
        module.exports = WebView;
        module.exports.WebView = WebView;
        module.exports.default = WebView;
        PATCH_EOF
          echo "--- Patched react-native-webview/index.js to CJS ---"
        else
          echo "--- WARNING: $f not found ---"
        fi

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Run expo prebuild
      run: npx expo prebuild --platform android --no-install

    - name: Verify app_name in strings.xml (software name should be CADonField)
      run: |
        echo "--- Checking app_name in strings.xml ---"
        cat android/app/src/main/res/values/strings.xml | grep -n 'app_name'

    - name: Fix Kotlin/Compose compatibility
      run: |
        cat >> android/build.gradle << 'EOF'
        subprojects {
            tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                kotlinOptions {
                    freeCompilerArgs += ["-P", "plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=true"]
                }
            }
        }
        EOF
        echo "--- Added suppressKotlinVersionCompatibilityCheck ---"

    - name: Build Android APK (bundleInDebug=true embeds JS inside APK)
      run: |
        cd android
        export GRADLE_OPTS="-Xmx4g -XX:MaxMetaspaceSize=512m"
        export JAVA_OPTS="-Xmx4g"
        ./gradlew assembleDebug -PbundleInDebug=true --no-daemon 2>&1 | tail -200
        cd ..
        echo "--- APK output listing ---"
        ls -lh android/app/build/outputs/apk/debug/
        echo "--- Check if bundle inside APK assets ---"
        unzip -l android/app/build/outputs/apk/debug/app-debug.apk | grep -i "bundle" || echo "WARNING: no bundle found in APK assets"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: CADonField-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 14