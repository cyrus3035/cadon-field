name: Build Android Debug APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Run expo prebuild
      run: npx expo prebuild --platform android

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug
        cd ..

    - name: Rename APK
      run: |
        cp android/app/build/outputs/apk/debug/app-debug.apk CadonField-debug.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: CadonField-debug-apk
        path: CadonField-debug.apk
        retention-days: 14
