name: Build CADonField Debug APK (Gradle Cloud)

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 35
          build-tools: 35.0.0
          ndk: 26.1.10909125

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install npm dependencies
        run: |
          echo "--- Installing npm dependencies ---"
          npm ci
          echo "--- npm list ---"
          npm list --depth=1 2>&1 | head -30

      - name: Patch react-native-webview ESM for Node 24 compatibility
        run: |
          echo "--- Patching react-native-webview for Node 24 ---"
          cat > node_modules/react-native-webview/index.js << 'EOF'
          const WebView = require('./lib/WebView').default;
          module.exports = WebView;
          EOF
          echo "--- Patch applied ---"

      - name: Build JS bundle with experimental-vm-modules (Node 24 ESM fix)
        run: |
          echo "--- Building JS bundle ---"
          mkdir -p android/app/src/main/assets
          NODE_OPTIONS=--experimental-vm-modules npx react-native bundle --platform android --dev true --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res
          echo "--- Bundle output listing ---"
          ls -lh android/app/src/main/assets/
          echo "--- Bundle size verification ---"
          if [ ! -f android/app/src/main/assets/index.android.bundle ]; then
            echo "ERROR: index.android.bundle not found!"
            exit 1
          fi
          BUNDLE_SIZE=$(wc -c < android/app/src/main/assets/index.android.bundle)
          echo "Bundle size: $BUNDLE_SIZE bytes"
          if [ $BUNDLE_SIZE -lt 1000 ]; then
            echo "ERROR: Bundle size too small - likely empty or corrupted!"
            exit 1
          fi

      - name: Build Android APK with Gradle
        run: |
          echo "--- Building APK ---"
          cd android
          ./gradlew assembleDebug -x bundleDebugJsAndAssets 2>&1 | tail -80

      - name: Verify APK contains JS bundle
        run: |
          echo "--- Verifying APK contents ---"
          APK_PATH=$(find android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          echo "APK path: $APK_PATH"
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: APK not found!"
            exit 1
          fi
          unzip -l "$APK_PATH" | grep "index.android.bundle"
          if [ $? -ne 0 ]; then
            echo "ERROR: index.android.bundle not found in APK!"
            exit 1
          fi
          echo "SUCCESS: index.android.bundle is embedded in APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cadonfield-debug.apk
          path: android/app/build/outputs/apk/debug/*.apk
