name: Build CADonField Debug APK (Gradle Cloud)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK packages
      run: sdkmanager "build-tools;34.0.0" "platforms;android-35"

    - name: Run expo prebuild
      run: npx expo prebuild --platform android --no-install

    - name: Fix Kotlin/Compose version compatibility
      run: |
        cat >> android/build.gradle << 'EOF'

        subprojects {
            tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                kotlinOptions {
                    freeCompilerArgs += ["-P", "plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=true"]
                }
            }
        }
        EOF
        echo "--- Added suppressKotlinVersionCompatibilityCheck to root build.gradle ---"
        tail -10 android/build.gradle

    - name: Create assets directory and bundle JS into APK (fix Unable to load script)
      run: |
        mkdir -p android/app/src/main/assets
        mkdir -p android/app/src/main/res
        npx react-native bundle \
          --platform android \
          --dev false \
          --entry-file index.js \
          --bundle-output android/app/src/main/assets/index.android.bundle \
          --assets-dest android/app/src/main/res
        echo "--- JS bundle created ---"
        ls -lh android/app/src/main/assets/
        echo "--- Assets count ---"
        find android/app/src/main/res -type f | wc -l

    - name: Build Android APK (with bundleInDebug=true as second safety net)
      run: |
        cd android
        ./gradlew assembleDebug -PbundleInDebug=true
        cd ..
        echo "--- APK output ---"
        ls -lh android/app/build/outputs/apk/debug/

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: CADonField-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 14
