name: Build CADonField Debug APK (Gradle Cloud)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: Patch react-native-webview/index.js ESM -> CJS (Node 24 compatibility)
      run: |
        f="node_modules/react-native-webview/index.js"
        if [ -f "$f" ]; then
          cat > "$f" << 'PATCH_EOF'
        const WebView = require('./lib/WebView').default;
        module.exports = WebView;
        module.exports.WebView = WebView;
        module.exports.default = WebView;
        PATCH_EOF
          echo "--- Patched react-native-webview/index.js to CJS ---"
          cat "$f"
        else
          echo "--- WARNING: $f not found ---"
        fi

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK packages
      run: sdkmanager "build-tools;34.0.0" "platforms;android-35"

    - name: Run expo prebuild
      run: npx expo prebuild --platform android --no-install

    - name: Fix Kotlin/Compose version compatibility
      run: |
        cat >> android/build.gradle << 'EOF'

        subprojects {
            tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                kotlinOptions {
                    freeCompilerArgs += ["-P", "plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=true"]
                }
            }
        }
        EOF
        echo "--- Added suppressKotlinVersionCompatibilityCheck to root build.gradle ---"
        tail -10 android/build.gradle

    - name: Configure gradle.properties to enable bundleInDebug
      run: |
        echo "react.bundleInDebug=true" >> android/gradle.properties
        echo "react.enableHermes=false" >> android/gradle.properties
        echo "--- gradle.properties after changes ---"
        cat android/gradle.properties

    - name: Build JS bundle (index.android.bundle) using gradle task
      run: |
        cd android
        ./gradlew bundleDebugJsAndAssets
        cd ..
        echo "--- JS bundle generation output ---"
        ls -lh android/app/build/generated/assets/react/debug/

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug
        cd ..
        echo "--- APK output listing ---"
        ls -lh android/app/build/outputs/apk/debug/

    - name: Verify bundle is packaged in APK
      run: |
        echo "--- Checking for index.android.bundle inside APK ---"
        BUNDLE_FOUND=$(unzip -l android/app/build/outputs/apk/debug/app-debug.apk | grep -c "index.android.bundle")
        if [ "$BUNDLE_FOUND" -gt 0 ]; then
          echo "SUCCESS: index.android.bundle found in APK"
        else
          echo "FAILURE: index.android.bundle NOT found in APK"
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: CADonField-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 14
