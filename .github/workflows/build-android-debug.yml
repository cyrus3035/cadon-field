name: Build CadonField Debug APK (Gradle Cloud)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK packages
      run: sdkmanager "build-tools;34.0.0" "platforms;android-35"

    - name: Run expo prebuild
      run: npx expo prebuild --platform android --no-install

    - name: Fix Kotlin/Compose version compatibility
      run: |
        # Downgrade Compose Compiler from 1.5.15 to 1.5.14 (compatible with Kotlin 1.9.24)
        find android -type f \( -name "*.gradle" -o -name "*.gradle.kts" \) -exec sed -i 's/1\.5\.15/1.5.14/g' {} +
        echo "--- Compose Compiler version after fix ---"
        grep -rn "1.5.14\|composeOptions" android/ || true

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug
        cd ..

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: CadonField-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 14
