name: Build CadonField Debug APK (Gradle Cloud)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: Fix react-native-webview ESM issue for Node 24
      run: |
        node -e "
        const fs = require('fs');
        const f = 'node_modules/react-native-webview/index.js';
        if (fs.existsSync(f)) {
          let c = fs.readFileSync(f, 'utf8');
          if (c.includes('import ')) {
            c = c.replace(/import (\w+) from '([^']+)';/g, \"const $1 = require('$2').default || require('$2');\");
            c = c.replace(/export \{ (\w+) \};/g, 'module.exports.$1 = $1;');
            c = c.replace(/export default (\w+);/g, 'module.exports = $1;');
            fs.writeFileSync(f, c);
            console.log('Patched react-native-webview/index.js to CommonJS');
          }
        }
        "

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android SDK packages
      run: sdkmanager "build-tools;34.0.0" "platforms;android-35"

    - name: Run expo prebuild
      run: npx expo prebuild --platform android --no-install

    - name: Build Android APK
      run: |
        cd android
        ./gradlew assembleDebug
        cd ..

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: CadonField-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 14
