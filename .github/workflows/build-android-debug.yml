name: Build CADonField Debug APK (Gradle Cloud)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x

    - name: Install dependencies
      run: npm install

    - name: Install Android SDK manually
      run: |
        export ANDROID_HOME=$HOME/android-sdk
        mkdir -p $ANDROID_HOME/cmdline-tools
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdline-tools.zip
        unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
        mv /tmp/cmdline-tools/cmdline-tools $ANDROID_HOME/cmdline-tools/latest
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

    - name: Install Android SDK packages
      run: |
        yes | sdkmanager --licenses
        sdkmanager "build-tools;34.0.0" "platforms;android-35"

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/build.gradle', 'android/app/build.gradle', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Run expo prebuild
      run: npx expo prebuild --platform android --no-install

    - name: Verify app_name in strings.xml
      run: |
        echo "--- Checking app_name ---"
        cat android/app/src/main/res/values/strings.xml | grep app_name

    - name: Fix Kotlin/Compose compatibility
      run: |
        cat >> android/build.gradle << 'EOF'
        subprojects {
            tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
                kotlinOptions {
                    freeCompilerArgs += ["-P", "plugin:androidx.compose.compiler.plugins.kotlin:suppressKotlinVersionCompatibilityCheck=true"]
                }
            }
        }
        EOF

    - name: Force JS bundle embedding in debug build
      run: |
        echo "--- Forcing debuggableVariants = [] to ensure JS bundle is embedded ---"
        sed -i '/react {/a\    debuggableVariants = []' android/app/build.gradle
        grep -A 5 "react {" android/app/build.gradle

    - name: Create assets directory and generate JS bundle manually
      run: |
        mkdir -p android/app/src/main/assets
        echo "=== Starting react-native bundle generation ==="
        timeout 120 npx react-native bundle --platform android --dev false --entry-file index.js --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res/
        if [ -f "android/app/src/main/assets/index.android.bundle" ]; then
          echo "=== JS bundle generated successfully ==="
          ls -lh android/app/src/main/assets/index.android.bundle
        else
          echo "=== JS bundle generation failed or timed out, skipping manual generation ==="
          echo "Gradle will generate bundle during build"
        fi

    - name: Build APK
      run: |
        cd android
        export GRADLE_OPTS="-Xmx4g -XX:MaxMetaspaceSize=512m"
        export JAVA_OPTS="-Xmx4g"
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -200
        cd ..
        ls -lh android/app/build/outputs/apk/debug/ || echo "APK not found"
        unzip -l android/app/build/outputs/apk/debug/app-debug.apk | grep bundle || echo "Bundle not in APK"

    - name: Verify APK exists before upload
      run: |
        echo "=== Checking APK file ==="
        ls -la android/app/build/outputs/apk/debug/
        if [ -f "android/app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "APK file exists"
          wc -c android/app/build/outputs/apk/debug/app-debug.apk
        else
          echo "ERROR: APK file not found!"
          exit 1
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CADonField-debug-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 14